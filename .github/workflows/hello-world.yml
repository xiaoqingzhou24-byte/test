name: My First Action  # 工作流的名字

on: [push]             # 触发条件：当有代码 push 到仓库时执行

jobs:
  say-hello:           # 任务 ID
    runs-on: ubuntu-latest  # 运行环境：GitHub 提供的免费虚拟机
    
    steps:
      - name: Check out code  # 第一步：拉取仓库代码
        uses: actions/checkout@v4

      - name: Run a script    # 第二步：执行自定义命令
        run: echo "Hello, GitHub Actions! The code is pushed."

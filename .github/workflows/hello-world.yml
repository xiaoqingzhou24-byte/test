name: Print Changed Files

on: [push]

jobs:
  show-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 关键：默认只拉取最后一次提交，设为2才能对比前一次提交

      - name: List changed files
        run: |
          echo "以下是本次提交修改的文件列表："
          git diff --name-only HEAD^ HEAD
